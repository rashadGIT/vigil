name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check (all workspaces)
        run: npm run type-check --workspaces --if-present

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (all workspaces)
        run: npm run lint --workspaces --if-present

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (all workspaces, --if-present keeps CI green during scaffold phases)
        run: npm run build --workspaces --if-present

      - name: Report bundle sizes (if dist/ exists)
        run: |
          if [ -d "frontend/.next" ]; then
            du -sh frontend/.next
          fi
          if [ -d "backend/dist" ]; then
            du -sh backend/dist
          fi
        continue-on-error: true
