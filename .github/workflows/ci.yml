name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check (all workspaces)
        run: npm run type-check --workspaces --if-present

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (all workspaces)
        run: npm run lint --workspaces --if-present

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (all workspaces, --if-present keeps CI green during scaffold phases)
        run: npm run build --workspaces --if-present

      - name: Report bundle sizes (if dist/ exists)
        run: |
          if [ -d "frontend/.next" ]; then
            du -sh frontend/.next
          fi
          if [ -d "backend/dist" ]; then
            du -sh backend/dist
          fi
        continue-on-error: true

  test:
    name: Backend Tests (unit + contract)
    runs-on: ubuntu-latest
    needs: [type-check]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vigil
          POSTGRES_PASSWORD: vigil
          POSTGRES_DB: vigil_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://vigil:vigil@localhost:5432/vigil_test
      NODE_ENV: test
      DEV_AUTH_BYPASS: 'true'
      INTERNAL_API_KEY: ci-internal-key-test
      N8N_WEBHOOK_GRIEF_FOLLOWUP: https://PLACEHOLDER.n8n.cloud/test
      N8N_WEBHOOK_INTAKE_NOTIFY: https://PLACEHOLDER.n8n.cloud/test
      N8N_WEBHOOK_STAFF_NOTIFY: https://PLACEHOLDER.n8n.cloud/test
      N8N_WEBHOOK_DOC_GENERATE: https://PLACEHOLDER.n8n.cloud/test
      N8N_WEBHOOK_REVIEW_REQUEST: https://PLACEHOLDER.n8n.cloud/test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run database migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Run backend tests with coverage
        working-directory: backend
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  test-frontend:
    name: Frontend Tests (unit + component)
    runs-on: ubuntu-latest
    needs: [build]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test -- --passWithNoTests

  test-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [build, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_DEV_AUTH_BYPASS: 'true'
          NEXT_PUBLIC_API_URL: http://localhost:3001
          CI: 'true'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
